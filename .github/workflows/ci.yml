name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install yamllint
        run: python3 -m pip install yamllint

      - name: Lint YAML files
        run: |
          # Lint all hand-authored and auto-generated YAML files in the repo.
          find .github/workflows -name '*.yml' | sort | xargs yamllint -c .yamllint.yml

  agent-frontmatter:
    name: Agent Frontmatter Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install PyYAML
        run: python3 -m pip install pyyaml

      - name: Validate agent and workflow frontmatter
        run: python3 .github/scripts/check-frontmatter.py

  url-check:
    name: URL Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check URLs in agent and workflow files
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          # Scan only Markdown files to avoid noisy/unreachable URLs embedded
          # in the auto-generated *.lock.yml files (e.g. docker-internal hosts).
          # The step is non-blocking so a temporarily unavailable URL does not
          # break every PR.
          args: >-
            --verbose
            --no-progress
            --timeout 30
            --exclude "github\.github\.com"
            .github/agents/**/*.md
            .github/workflows/*.md
          fail: false
