name: "Issue Implementer (Scheduled)"

# Trigger the issue-implementer agent every 2 hours.
on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch: # allow manual runs for testing

# Prevent concurrent runs to avoid conflicting commits.
concurrency:
  group: issue-implementer
  cancel-in-progress: false

jobs:
  run-issue-implementer:
    runs-on: ubuntu-latest

    # Only run on the default branch to avoid unintended commits on feature branches.
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    permissions:
      contents: write
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install gh-aw extension
        uses: github/gh-aw/actions/setup-cli@v0.53.6
        with:
          version: v0.53.6

      - name: Run issue-implementer agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh aw run .github/agents/issue-implementer.agent.md
