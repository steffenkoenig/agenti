version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    labels:
      - "dependencies"
    ignore:
      # Ignore dependencies that are only present in auto-generated .lock.yml workflow files.
      # These should be updated by recompiling with `gh aw compile`, not by Dependabot.
      - dependency-name: "github/gh-aw/actions/setup"
        versions:
          - "*"
